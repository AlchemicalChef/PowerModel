# fly.toml — Fly.io deployment configuration for PowerModel
# Deploy: fly deploy
# Logs:   fly logs
# SSH:    fly ssh console

app = "powermodel"
primary_region = "iad"  # US East (Virginia) — closest to Eastern IC data

[build]

[env]
  PHX_HOST = "powermodel.fly.dev"
  PORT = "4000"
  ECTO_IPV6 = "true"
  POOL_SIZE = "10"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2

[checks]
  [checks.liveness]
    port = 4000
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

# Migrations run manually: fly ssh console --command "/app/bin/migrate"
# [deploy]
#   release_command = "/app/bin/migrate"
